<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🧚🏻‍♂️💦</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    cursor:none;
    overflow:hidden;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Poppins,sans-serif;

    background:
    radial-gradient(circle at 20% 25%, rgba(255,210,70,.25), transparent 12%),
    radial-gradient(circle at 80% 15%, rgba(255,255,255,.12), transparent 18%),
    radial-gradient(circle at 70% 70%, #315b9b 0%, transparent 28%),
    linear-gradient(160deg,#07122d,#16386d,#22599d,#143462);

    position:relative;
}

/* Swirling background */

body::before,
body::after{
    content:"";
    position:absolute;
    width:220%;
    height:220%;
    border-radius:45%;
    pointer-events:none;
}

body::before{

    background:
    repeating-radial-gradient(circle,
    rgba(255,255,255,.08) 0px 2px,
    transparent 3px 30px);

    animation:spin 120s linear infinite;

}

body::after{

    background:
    repeating-radial-gradient(circle,
    rgba(255,215,0,.08) 0px 3px,
    transparent 5px 38px);

    animation:spinReverse 180s linear infinite;

}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes spinReverse{
from{transform:rotate(360deg);}
to{transform:rotate(0deg);}
}

/* Stars */

.star{
    position:absolute;
    color:white;
    animation:twinkle 2s infinite alternate;
    pointer-events:none;
}

@keyframes twinkle{
from{
    opacity:.25;
    transform:scale(.8);
}
to{
    opacity:1;
    transform:scale(1.3);
}
}

/* Card */

.card{

    position:relative;
    z-index:20;

    width:min(90%,680px);

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);

    padding:50px 35px;

    border-radius:28px;

    text-align:center;

    color:white;

    box-shadow:0 20px 60px rgba(0,0,0,.35);

}

h1{

    font-family:"Playfair Display",serif;
    font-size:clamp(2.2rem,6vw,4rem);
    margin-bottom:20px;

    text-shadow:0 0 15px rgba(255,255,255,.2);

}

.message{

    line-height:1.9;
    font-size:1.1rem;

}

.quote{

    margin-top:20px;
    color:#ffe17b;
    font-style:italic;

}

/* Flowers */

.flower{

    position:absolute;
    width:130px;
    height:130px;

    animation:float 5s ease-in-out infinite;

}

@keyframes float{

0%,100%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

}

.petal{

    position:absolute;

    width:34px;
    height:62px;

    background:#ffcb2f;

    border-radius:50% 50% 0 0;

    transform-origin:bottom center;

}

.center{

    position:absolute;

    left:44px;
    top:44px;

    width:42px;
    height:42px;

    background:#603913;
    border-radius:50%;

}

.stem{

    position:absolute;

    left:60px;
    top:70px;

    width:6px;
    height:120px;

    background:#347a32;

}

.leaf{

    position:absolute;

    width:28px;
    height:18px;

    background:#57a447;

    border-radius:50% 0;

}

.top-left{
top:15px;
left:15px;
}

.top-right{
top:15px;
right:15px;
}

.bottom-left{
bottom:10px;
left:10px;
}

.bottom-right{
bottom:10px;
right:10px;
}

/* Confetti */

.confetti{

    position:fixed;

    width:10px;
    height:14px;

    border-radius:2px;

    pointer-events:none;

    z-index:999;

}

/* Otter Cursor */

#otterCursor{

    position:fixed;

    font-size:34px;

    pointer-events:none;

    z-index:10000;

    transform:translate(-50%,-50%);

    transition:transform .08s linear;

}

.instructions{

    position:absolute;

    bottom:20px;

    color:white;

    opacity:.75;

    font-size:.9rem;

    z-index:20;

    text-align:center;

}

@media(max-width:700px){

.flower{
transform:scale(.7);
}

.card{
padding:35px 22px;
}

.message{
font-size:1rem;
}

.instructions{
font-size:.75rem;
padding:0 20px;
}

}

</style>

</head>

<body>

<div class="flower top-left"></div>
<div class="flower top-right"></div>
<div class="flower bottom-left"></div>
<div class="flower bottom-right"></div>

<div class="card">

<h1>🎂Happy Birthday🎂 </h1>
<h1>🧚🏻‍♂️💦</h1>

<div class="message">

May your day bloom like a field of golden sunflowers,
shine brighter than the stars above,
and be painted with endless joy,
love, laughter, and unforgettable memories.

</div>

<div class="quote">

"Every birthday is another masterpiece waiting to be painted."

</div>

</div>

<div class="instructions">
🦦 Click anywhere to spray confetti!
</div>

<div id="otterCursor">🦦</div>

<script>

/* ---------- Stars ---------- */

for(let i=0;i<70;i++){

    const s=document.createElement("div");
    s.className="star";
    s.textContent="✦";

    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.fontSize=(8+Math.random()*16)+"px";
    s.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(s);

}

/* ---------- Flowers ---------- */

document.querySelectorAll(".flower").forEach(f=>{

    for(let i=0;i<12;i++){

        const petal=document.createElement("div");
        petal.className="petal";

        petal.style.transform=
        `translate(48px,0px) rotate(${i*30}deg)`;

        f.appendChild(petal);

    }

    const center=document.createElement("div");
    center.className="center";
    f.appendChild(center);

    const stem=document.createElement("div");
    stem.className="stem";
    f.appendChild(stem);

    const leaf1=document.createElement("div");
    leaf1.className="leaf";
    leaf1.style.left="35px";
    leaf1.style.top="120px";
    leaf1.style.transform="rotate(-35deg)";
    f.appendChild(leaf1);

    const leaf2=document.createElement("div");
    leaf2.className="leaf";
    leaf2.style.left="62px";
    leaf2.style.top="145px";
    leaf2.style.transform="rotate(140deg)";
    f.appendChild(leaf2);

});

/* ---------- Otter Cursor ---------- */

const otter=document.getElementById("otterCursor");

document.addEventListener("mousemove",(e)=>{

    otter.style.left=e.clientX+"px";
    otter.style.top=e.clientY+"px";

});

document.addEventListener("mousedown",()=>{

    otter.style.transform="translate(-50%,-50%) scale(.75) rotate(-20deg)";

});

document.addEventListener("mouseup",()=>{

    otter.style.transform="translate(-50%,-50%) scale(1) rotate(0deg)";

});

/* ---------- Confetti ---------- */

const colors=[
"#FFD93D",
"#FF6B6B",
"#4D96FF",
"#6BCB77",
"#FF8FAB",
"#FFFFFF",
"#F5C542"
];

function confettiPiece(x,y){

    const c=document.createElement("div");

    c.className="confetti";

    c.style.left=x+"px";
    c.style.top=y+"px";

    c.style.background=
    colors[Math.floor(Math.random()*colors.length)];

    c.style.width=(5+Math.random()*8)+"px";
    c.style.height=(8+Math.random()*10)+"px";

    document.body.appendChild(c);

    const angle=Math.random()*Math.PI*2;
    const speed=120+Math.random()*220;
    const rotate=Math.random()*1080;

    c.animate([

        {
            transform:"translate(0,0) rotate(0deg)",
            opacity:1
        },

        {
            transform:`translate(${Math.cos(angle)*speed}px,
                                 ${Math.sin(angle)*speed+250}px)
                                 rotate(${rotate}deg)`,
            opacity:0
        }

    ],{

        duration:1800+Math.random()*700,
        easing:"cubic-bezier(.15,.8,.2,1)"

    });

    setTimeout(()=>c.remove(),2600);

}

function burst(x,y){

    for(let i=0;i<120;i++){

        confettiPiece(x,y);

    }

}

document.addEventListener("click",(e)=>{

    burst(e.clientX,e.clientY);

});

/* ---------- Falling confetti ---------- */

setInterval(()=>{

    confettiPiece(
        Math.random()*window.innerWidth,
        -20
    );

},180);

/* Initial celebration */

setTimeout(()=>{

    burst(window.innerWidth/2,window.innerHeight/2);

},500);

</script>

</body>
</html>
